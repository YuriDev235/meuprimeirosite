<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="fundo"></div>

    <div class="container">

        <div class="janela">

            <h1>Gerador de QR Code</h1>

            <input
                id="link"
                type="text"
                placeholder="Cole um link aqui">

            <button id="gerar">
                Gerar
            </button>

            <div class="resultado">
                <img id="qrcode" src="" alt="">
            </div>

            <button id="download">
                Baixar QR Code
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
